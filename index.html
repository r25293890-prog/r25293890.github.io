<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя история</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; max-width: 600px; margin: 20px auto; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 90%; padding: 10px; margin-bottom: 10px; font-size: 16px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 4px;}
    </style>
</head>
<body>

    <div class="box">
        <h2>Как вас зовут?</h2>
        <input type="text" id="nameInput" placeholder="Введите имя...">
        <button onclick="replaceName()">Прочитать текст</button>
    </div>

    <div class="box" id="storyText">
        Однажды [ИМЯ] отправился в долгое путешествие. По пути [ИМЯ] встретил мудреца, который сказал: "Только [ИМЯ] сможет разгадать эту тайну!"
    </div>

    <script>
        const originalText = document.getElementById('storyText').innerHTML;
        function replaceName() {
            const name = document.getElementById('nameInput').value.trim();
            if (name === "") return alert("Введите имя!");
            document.getElementById('storyText').innerHTML = originalText.replace(/\[ИМЯ\]/g, name);
        }
    </script>

</body>
</html>
