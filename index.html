<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя история</title>
    <style>
        /* Основные стили страницы */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #f4f4f9; 
            max-width: 600px; 
            margin: 40px auto; 
            padding: 20px; 
            color: #333;
            line-height: 1.6;
        }
        
        /* Белые блоки с тенью */
        .box { 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        /* Изначально прячем блок с историей */
        #storyContainer {
            display: none;
        }

        /* Красивое поле ввода */
        input { 
            width: calc(100% - 24px); 
            padding: 12px; 
            margin-bottom: 20px; 
            font-size: 16px; 
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        
        /* Кнопки */
        button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            font-size: 16px; 
            cursor: pointer; 
            border-radius: 4px;
            width: 100%;
            transition: 0.3s;
        }
        button:hover { background: #0056b3; }
        
        /* Серая кнопка "Назад" */
        .btn-back {
            background: #6c757d;
            margin-top: 20px;
        }
        .btn-back:hover { background: #5a6268; }
        
        h2 { margin-top: 0; }
    </style>
</head>
<body>

    <!-- 1. БЛОК ВВОДА ИМЕНИ (показывается сразу) -->
    <div class="box" id="inputContainer">
        <h2>Как вас зовут?</h2>
        <!-- onkeypress позволяет нажимать Enter вместо клика мышкой -->
        <input type="text" id="nameInput" placeholder="Введите ваше имя..." onkeypress="handleEnter(event)">
        <button onclick="showStory()">Прочитать текст</button>
    </div>

    <!-- 2. БЛОК С ИСТОРИЕЙ (изначально невидим) -->
    <div class="box" id="storyContainer">
        <!-- Сюда впишите свой текст с метками [ИМЯ] -->
        <div id="storyText">
            Однажды [ИМЯ] отправился в долгое путешествие. По пути [ИМЯ] встретил мудреца, который сказал: "Только [ИМЯ] сможет разгадать эту тайну!" И с тех пор все знали, что [ИМЯ] — настоящий герой.
        </div>
        
        <!-- Кнопка чтобы начать заново -->
        <button class="btn-back" onclick="resetStory()">Ввести другое имя</button>
    </div>

    <script>
        // Сохраняем в память оригинальный текст из HTML
        const originalText = document.getElementById('storyText').innerHTML;

        // Функция, которая срабатывает при нажатии "Прочитать текст"
        function showStory() {
            // Получаем то, что ввели в поле (убирая лишние пробелы)
            const name = document.getElementById('nameInput').value.trim();
            
            // Если поле пустое, выдаем предупреждение
            if (name === "") {
                alert("Пожалуйста, введите имя!");
                return;
            }

            // Ищем все [ИМЯ] и заменяем на введенное слово
            const newText = originalText.replace(/\[ИМЯ\]/g, name);
            
            // Вставляем новый текст на страницу
            document.getElementById('storyText').innerHTML = newText;

            // Прячем вопрос и показываем историю
            document.getElementById('inputContainer').style.display = 'none';
            document.getElementById('storyContainer').style.display = 'block';
        }

        // Функция для работы клавиши Enter
        function handleEnter(event) {
            if (event.key === "Enter") {
                showStory();
            }
        }

        // Функция для кнопки "Ввести другое имя"
        function resetStory() {
            document.getElementById('nameInput').value = ''; // очищаем поле
            document.getElementById('inputContainer').style.display = 'block'; // возвращаем вопрос
            document.getElementById('storyContainer').style.display = 'none'; // прячем историю
        }
    </script>

</body>
</html>
