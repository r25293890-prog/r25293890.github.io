<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя история</title>
    
    <!-- Подключение шрифтов из Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@0,400;0,600;1,400&family=Great+Vibes&family=Marck+Script&family=Viaoda+Libre&display=swap" rel="stylesheet">

    <style>
        /* ===================== */
        /* ЗАСТАВКА (GIF)        */
        /* ===================== */
        body:before {
            content: " ";
            height: 100vh;
            width: 100vw;
            display: block;
            position: fixed; 
            top: 0; 
            left: 0; 
            z-index: 9999;
            background-color: #000;
            background-image: url("https://raw.githubusercontent.com/r25293890-prog/SpaceheyAubrie/main/ezgif-6cb858b70af2e7aa.gif");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            animation: hideOverlay 1.5s ease 1s 1 normal forwards; 
            pointer-events: none;
        }

        @keyframes hideOverlay { 
            0% { opacity: 1; } 
            100% { opacity: 0; visibility: hidden; } 
        } 

        /* ===================== */
        /* ОСНОВНЫЕ СТИЛИ СТРАНИЦЫ */
        /* ===================== */
        body { 
            font-family: 'Cormorant Infant', serif; 
            background-image: url('https://images.metmuseum.org/CRDImages/dp/original/DP809138.jpg');
            background-repeat: repeat-y;
            background-size: cover;
            background-position: center center;
            background-attachment: fixed;
            
            max-width: 900px; 
            margin: 40px auto; 
            padding: 20px; 
            color: #000; 
            line-height: 1.6;
            font-size: 26px; 
        }
        
        .char1 { font-family: 'Great Vibes', cursive; font-size: 36px; color: #000; }
        .char2 { font-family: 'Viaoda Libre', serif; font-size: 30px; color: #000; }
        .char3 { font-family: 'Marck Script', cursive; font-size: 32px; color: #000; }

        .box { 
            background-color: #D4AC77; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5); 
            border: 2px solid #633F0F; 
            position: relative; 
        }

        #storyContainer { display: none; }

        /* ===================== */
        /* КНОПКИ                */
        /* ===================== */
        button { 
            font-family: 'Cormorant Infant', serif; 
            color: white; 
            border: none; 
            padding: 12px 20px; 
            font-size: 20px; 
            cursor: pointer; 
            border-radius: 4px;
            transition: 0.3s;
            height: 50px; 
        }
        
        .btn-main { background: #633F0F; width: 100%; font-size: 22px; }
        .btn-main:hover { background: #4a2e0a; }

        .btn-nav { 
            background: #7B674D; 
            width: 100%; 
            font-size: 16px; 
            white-space: nowrap; 
        }
        .btn-nav:hover { background: #5c4d39; }

        .btn-song { 
            background: #B68B51; 
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-sizing: border-box;
            color: white; 
            padding: 12px 20px; 
            font-size: 20px; 
            border-radius: 4px;
            transition: 0.3s;
            height: 50px; 
            font-family: 'Cormorant Infant', serif;
        }
        .btn-song:hover { background: #96703f; }
        
        .btn-back { 
            background: #D4B58A; 
            color: #000;
            border: 1px solid #7B674D;
        }
        .btn-back:hover { background: #c2a275; }

        /* ===================== */
        /* НИЖНЯЯ ПАНЕЛЬ С КНОПКАМИ */
        /* ===================== */
        .bottom-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px dashed #7B674D;
        }

        .tg-image-btn {
            display: block;
            transition: transform 0.3s ease, filter 0.3s ease;
        }
        
        .tg-image-btn img {
            height: 80px; 
            object-fit: contain;
        }

        .tg-image-btn:hover {
            transform: scale(1.05); 
            filter: brightness(1.1); 
        }
        
        .btn-next-bottom {
            background: #633F0F; 
            height: 80px; /* Чтобы была одной высоты с кнопкой ТГ */
            font-size: 22px;
            padding: 0 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-next-bottom:hover {
            background: #4a2e0a;
        }

        input { 
            font-family: 'Cormorant Infant', serif;
            width: calc(100% - 24px); 
            padding: 12px; 
            margin-bottom: 20px; 
            font-size: 22px; 
            background: #fdfaf6; 
            border: 2px solid #7B674D;
            border-radius: 4px;
            color: #000;
        }
        
        h2 { margin-top: 0; font-family: 'Cormorant Infant', serif; font-size: 32px;}

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 2px solid #7B674D; 
        }

        .nav-slot {
            width: 160px; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-image { height: 50px; object-fit: contain; }

        .center-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex: 1; 
        }

        .chapter-title {
            text-align: center;
            font-size: 40px; 
            font-weight: bold;
            margin-top: 10px;
            margin-bottom: 30px;
            color: #000; 
        }

        #storyText { min-height: 300px; }
        
        /* Стили для картинок ВНУТРИ текста главы */
        #storyText img {
            width: 100%; 
            max-width: 800px; 
            height: auto; 
            border-radius: 8px;
            display: block;
            margin: 30px auto; 
        }

        @media (max-width: 768px) {
            .top-nav { flex-direction: column; align-items: stretch; }
            .center-buttons { flex-direction: column; }
            .nav-slot { width: 100%; }
            button, .btn-song { width: 100%; }
            .chapter-title { font-size: 34px; }
            .bottom-nav { flex-direction: column; gap: 15px; }
            .tg-image-btn img { height: 60px; } 
            .btn-next-bottom { height: 60px; width: 100%; }
        }
    </style>
</head>
<body>

    <!-- 1. БЛОК ВВОДА ИМЕНИ -->
    <div class="box" id="inputContainer">
        <h2>Как вас зовут?</h2>
        <input type="text" id="nameInput" placeholder="Введите ваше имя..." onkeypress="handleEnter(event)">
        <button class="btn-main" onclick="startStory()">Прочитать текст</button>
    </div>

    <!-- 2. БЛОК С ИСТОРИЕЙ -->
    <div class="box" id="storyContainer">
        
        <div class="top-nav">
            <div class="nav-slot" id="prevSlot"></div>
            
            <div class="center-buttons">
                <a href="#" class="btn-song" id="songButton" target="_blank">♫ Песня главы</a>
                <button class="btn-back" onclick="resetStory()">Ввести другое имя</button>
            </div>

            <div class="nav-slot" id="nextSlot"></div>
        </div>

        <div class="chapter-title" id="chapterTitle"></div>
        <div id="storyText">Загрузка...</div>
        
        <!-- НИЖНЯЯ ПАНЕЛЬ -->
        <div class="bottom-nav" id="bottomNav">
            <a href="https://t.me/MerkhavSed" target="_blank" class="tg-image-btn" title="Перейти в Telegram">
                <img src="https://i.ibb.co/m5V3cFQD/2026-03-01-234222464-no-bg-preview-carve-photos.png" alt="Telegram Channel">
            </a>
            <button class="btn-next-bottom" id="bottomNextBtn" onclick="changeChapter(1)">Следующая глава →</button>
        </div>
        
    </div>

    <script>
        let currentChapter = 1;
        const totalChapters = 9;
        let userName = "";

        // Названия глав 
        const chapterTitles = [
            "Глава 1: Встреча",
            "Глава 2: Темный лес",
            "Глава 3: Древний замок",
            "Глава 4: Испытание огнем",

            "Глава 6: Тайна амулета",
            "Глава 7: Битва на вершине",
            "Глава 8: Рассвет",
            "Глава 9: Возвращение домой"

            "https://www.youtube.com/watch?v=WiinVuzh4DA&list=RDWiinVuzh4DA&start_radio=1",
            "https://www.youtube.com/watch?v=O1OTWCd40bc&list=RDO1OTWCd40bc&start_radio=1",
            "https://www.youtube.com/watch?v=M4ZoCHID9GI&list=RDM4ZoCHID9GI&start_radio=1",

            "https://www.youtube.com/watch?v=sElE_BfQ67s&list=RDsElE_BfQ67s&start_radio=1",

        function startStory() {
            userName = document.getElementById('nameInput').value.trim();
            if (userName === "") {
                alert("Пожалуйста, введите имя!");
                return;
            }

            document.getElementById('inputContainer').style.display = 'none';
            document.getElementById('storyContainer').style.display = 'block';
            
            currentChapter = 1;
            loadAndRenderChapter();
        }

        // АСИНХРОННАЯ ФУНКЦИЯ ЗАГРУЗКИ ГЛАВЫ ИЗ ФАЙЛА
        async function loadAndRenderChapter() {
            const titleElement = document.getElementById('chapterTitle');
            const textElement = document.getElementById('storyText');

            //
